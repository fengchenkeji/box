name: Conan CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Conan（指定版本）
      - name: Install Conan
        run: |
          pip install conan==2.0.11
          conan profile new default --detect > /dev/null
          conan profile update settings.compiler.libcxx=libstdc++11 default

      # 3. 执行项目构建
      - name: Build Project
        run: |
          chmod +x ./build.sh  # 确保脚本可执行
          ./build.sh

      # 4. 上传构建产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: build/ # 确认路径正确