name: Conan CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码（关键修复）
      - name: Checkout Code
        uses: actions/checkout@v4  # 修正为 checkout 动作
        with: 
        submodule: recursive

      # 2. 安装系统构建工具（可选但推荐）
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # 3. 安装 Conan（指定版本）
      - name: Install Conan
        run: |
          vcpkg/bootstrap-vcpkg.sh
          vcpkg/vcpkg -update-baseline
          #pip install conan==2.0.11          
          #conan profile detect --force
          #conan profile detect --force > /dev/null
          #conan profile update settings.compiler.libcxx=libstdc++11 default

      # 4. 执行项目构建
      - name: Build Project
        run: |
          vcpkg/vcpkg install --triplet=arm64-linux

      # 5. 上传构建产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
            path build/  # 根据实际构建产物路径调整
