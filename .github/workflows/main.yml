name: Conan CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 正确拉取代码及子模块
      - name: Checkout Code
        uses: actions/checkout@v4
        with: 
          submodules: recursive  # 修复参数名和缩进

      # 2. 安装系统构建工具
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # 3. 初始化 vcpkg（原误标为 Conan）
      - name: Setup vcpkg
        run: |
          chmod +x vcpkg/bootstrap-vcpkg.sh  # 确保脚本可执行
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg update-baseline

      # 4. 安装依赖并构建项目
      - name: Build Project
        run: |
          ./vcpkg/vcpkg install --triplet=arm64-linux
          # 若需集成到 CMake，添加以下环境变量：
          # echo "CMAKE_TOOLCHAIN_FILE=${PWD}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

      # 5. 上传构建产物（修正缩进和冒号）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/  # 根据实际路径调整